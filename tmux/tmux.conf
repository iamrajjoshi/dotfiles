# =============================================================================
# ~/.tmux.conf — Dracula-themed config for Ghostty + tmux-worktrees
# =============================================================================

# --- General Settings --------------------------------------------------------

# Prefix: Ctrl+A
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# True color for Ghostty
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-ghostty:Tc"

# No escape delay (critical for neovim)
set -sg escape-time 0

# Generous scrollback
set -g history-limit 50000

# Mouse support
set -g mouse on

# Window/pane numbering starts at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Don't auto-rename windows (preserve wt-new names: claude, dev, scratch)
setw -g automatic-rename off

# Focus events (needed by neovim autoread)
set -g focus-events on

# Longer pane number display
set -g display-panes-time 2000
set -g display-time 3000

# --- Keybindings ------------------------------------------------------------

# Reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Splits (visual mnemonics, same directory)
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in same directory
bind c new-window -c "#{pane_current_path}"

# Navigate panes (Cmd+Opt+Arrow via Ghostty)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes (repeatable, 5-cell increments)
bind -r S-Up    resize-pane -U 5
bind -r S-Down  resize-pane -D 5
bind -r S-Left  resize-pane -L 5
bind -r S-Right resize-pane -R 5

# Close pane (Cmd+W) — killing last pane auto-closes the window
bind x kill-pane
# Close window (Cmd+Shift+W) — kills all panes in window
bind X kill-window

# --- Appearance (Dracula-themed) ---------------------------------------------
# Colors: bg=#131318 fg=#ebece6 red=#fc4346 green=#50fb7b yellow=#f0fb8c
#         blue=#49baff magenta=#fc4cb4 cyan=#8be9fd gray=#555555

# Status bar
set -g status-position top
set -g status-justify left
set -g status-style "bg=#131318,fg=#ebece6"
set -g status-interval 3
set -g status-left-length 30
set -g status-right-length 80

# Left: session name (blue badge) + prefix highlight
set -g status-left "#[fg=#131318,bg=#49baff,bold] #S #[fg=#49baff,bg=#131318,nobold] #{prefix_highlight}"

# Right: wt-status widget
set -g status-right "#(~/code/tmux-worktrees/scripts/wt-status.sh) "

# Window tabs
setw -g window-status-format "#[fg=#555555] #I #W "
setw -g window-status-current-format "#[fg=#131318,bg=#fc4cb4,bold] #I #[fg=#fc4cb4,bg=#1a1a22,bold] #W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#555555"
set -g pane-active-border-style "fg=#49baff"

# Messages & copy mode
set -g message-style "fg=#ebece6,bg=#131318,bold"
setw -g mode-style "fg=#131318,bg=#8be9fd"
setw -g clock-mode-colour "#49baff"
set -g display-panes-colour "#555555"
set -g display-panes-active-colour "#49baff"

# --- tmux-worktrees Integration ---------------------------------------------

# Worktree switcher popup (prefix + w)
bind w display-popup -E -w 90% -h 80% -d '#{pane_current_path}' \
  "~/code/tmux-worktrees/scripts/wt-switcher.sh #{session_name}"

# --- Misc --------------------------------------------------------------------

setw -g mode-keys emacs
set -g status-keys emacs
setw -g aggressive-resize on
set -g detach-on-destroy off

# --- Plugins (TPM) ------------------------------------------------------------

set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-sessionist'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'

# Remap sessionist kill-session (default X) to avoid conflict with kill-window
set -g @sessionist-kill-session 'K'

# Prefix highlight styling
set -g @prefix_highlight_fg '#131318'
set -g @prefix_highlight_bg '#f0fb8c'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_mode_attr 'fg=#131318,bg=#8be9fd'

# Auto-restore sessions on tmux start
set -g @continuum-restore 'on'

source-file "/Users/raj.joshi/code/tmux-worktrees/tmux.conf"

# Initialize TPM (must be last line)
# Ensure Homebrew PATH is available for run-shell subprocesses
set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin"
run '~/.tmux/plugins/tpm/tpm'
